<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Software development life cycle loop: Requirements, Design, Code, Test, Deploy, Maintain, then back to Requirements.">
  <title>Software Development Life Cycle</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Software Development Life Cycle</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Plan, build, ship, and improve software continuously</text>

  <!-- Requirements -->
  <g>
    <rect x="30" y="85" width="130" height="70" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="95" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0b4f8c">Requirements</text>
    <text x="95" y="135" text-anchor="middle" font-size="11" fill="#6b6f78">What must it do?</text>
  </g>

  <!-- Design -->
  <g>
    <rect x="170" y="85" width="110" height="70" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <text x="225" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Design</text>
    <text x="225" y="135" text-anchor="middle" font-size="11" fill="#6b6f78">Plan the solution</text>
  </g>

  <!-- Code -->
  <g>
    <rect x="290" y="85" width="100" height="70" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="340" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1f9d57">Code</text>
    <text x="340" y="135" text-anchor="middle" font-size="11" fill="#6b6f78">Build features</text>
  </g>

  <!-- Test -->
  <g>
    <rect x="400" y="85" width="100" height="70" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="450" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#f59e0b">Test</text>
    <text x="450" y="135" text-anchor="middle" font-size="11" fill="#6b6f78">Find bugs</text>
  </g>

  <!-- Deploy -->
  <g>
    <rect x="510" y="85" width="120" height="70" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <text x="570" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Deploy</text>
    <text x="570" y="135" text-anchor="middle" font-size="11" fill="#6b6f78">Release to users</text>
  </g>

  <!-- arrows top row -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="162" y1="120" x2="167" y2="120"/>
    <polygon points="167,113 180,120 167,127"/>
    <line x1="282" y1="120" x2="287" y2="120"/>
    <polygon points="287,113 300,120 287,127"/>
    <line x1="392" y1="120" x2="397" y2="120"/>
    <polygon points="397,113 410,120 397,127"/>
    <line x1="502" y1="120" x2="507" y2="120"/>
    <polygon points="507,113 520,120 507,127"/>
  </g>

  <!-- Maintain -->
  <g>
    <rect x="230" y="195" width="200" height="60" rx="16" fill="#fdecec" stroke="#dc2626" stroke-width="1.5"/>
    <text x="330" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">Maintain</text>
    <text x="330" y="240" text-anchor="middle" font-size="11" fill="#6b6f78">Fix bugs, add features, monitor</text>
  </g>

  <!-- arrows down and back -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="570" y1="156" x2="570" y2="178"/>
    <line x1="570" y1="178" x2="432" y2="225"/>
    <polygon points="425,221 432,225 429,233"/>
    <line x1="230" y1="225" x2="95" y2="178"/>
    <line x1="95" y1="178" x2="95" y2="156"/>
    <polygon points="88,163 95,156 102,163"/>
  </g>

  <!-- footer note -->
  <text x="330" y="284" text-anchor="middle" font-size="11.5" fill="#9aa3af">Each loop feeds new requirements, so software keeps improving.</text>
</svg>
