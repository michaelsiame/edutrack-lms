<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 320" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Comparison of sourcing from a local Zambian supplier versus importing from South Africa or China.">
  <title>Local supplier versus imported supplier</title>

  <text x="330" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Local vs Imported Suppliers</text>
  <text x="330" y="52" text-anchor="middle" font-size="13" fill="#6b6f78">What to weigh when sourcing for a Zambian school, clinic or farm</text>

  <!-- Local supplier card -->
  <g>
    <rect x="40" y="74" width="260" height="210" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="170" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Local Zambian Supplier</text>

    <circle cx="70" cy="132" r="3" fill="#0b4f8c"/>
    <text x="86" y="136" font-size="12" fill="#6b6f78">Faster delivery, often 1-3 days</text>

    <circle cx="70" cy="154" r="3" fill="#0b4f8c"/>
    <text x="86" y="158" font-size="12" fill="#6b6f78">Lower inland transport cost</text>

    <circle cx="70" cy="176" r="3" fill="#0b4f8c"/>
    <text x="86" y="180" font-size="12" fill="#6b6f78">Pay in ZMW, no forex risk</text>

    <circle cx="70" cy="198" r="3" fill="#0b4f8c"/>
    <text x="86" y="202" font-size="12" fill="#6b6f78">Easier returns, dispute resolution</text>

    <circle cx="70" cy="220" r="3" fill="#0b4f8c"/>
    <text x="86" y="224" font-size="12" fill="#6b6f78">Supports local jobs and SMEs</text>

    <circle cx="70" cy="242" r="3" fill="#0b4f8c"/>
    <text x="86" y="246" font-size="12" fill="#6b6f78">May have limited stock or range</text>
  </g>

  <!-- vs chip -->
  <circle cx="330" cy="179" r="18" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
  <text x="330" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#6b6f78">vs</text>

  <!-- Imported supplier card -->
  <g>
    <rect x="360" y="74" width="260" height="210" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="490" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Imported Supplier</text>

    <circle cx="390" cy="132" r="3" fill="#f59e0b"/>
    <text x="406" y="136" font-size="12" fill="#6b6f78">Lower unit price at large volume</text>

    <circle cx="390" cy="154" r="3" fill="#f59e0b"/>
    <text x="406" y="158" font-size="12" fill="#6b6f78">Wider range and specifications</text>

    <circle cx="390" cy="176" r="3" fill="#f59e0b"/>
    <text x="406" y="180" font-size="12" fill="#6b6f78">USD/ZMW exchange-rate risk</text>

    <circle cx="390" cy="198" r="3" fill="#f59e0b"/>
    <text x="406" y="202" font-size="12" fill="#6b6f78">Long lead time via Dar/Beira port</text>

    <circle cx="390" cy="220" r="3" fill="#f59e0b"/>
    <text x="406" y="224" font-size="12" fill="#6b6f78">Customs clearance and duties</text>

    <circle cx="390" cy="242" r="3" fill="#f59e0b"/>
    <text x="406" y="246" font-size="12" fill="#6b6f78">Returns are slow and expensive</text>
  </g>

  <text x="330" y="310" text-anchor="middle" font-size="11.5" fill="#9aa3af">Example: procuring 500 exercise books for a rural school in Kalomo.</text>
</svg>
