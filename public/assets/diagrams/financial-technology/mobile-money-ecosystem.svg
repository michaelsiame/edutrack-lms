<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Mobile money ecosystem showing cash moving from customer to agent, into a mobile wallet, through the national switch, and to the bank.">
  <title>The Mobile Money Ecosystem</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">The Mobile Money Ecosystem</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">How cash becomes digital value and moves through Zambia's financial system</text>

  <!-- Stage 1: Customer -->
  <g>
    <rect x="15" y="95" width="110" height="130" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <circle cx="70" cy="135" r="22" fill="#0b4f8c"/>
    <circle cx="70" cy="129" r="7" fill="#ffffff"/>
    <path d="M58 146 a13 10 0 0 1 24 0 z" fill="#ffffff"/>
    <text x="70" y="177" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Customer</text>
    <text x="70" y="195" text-anchor="middle" font-size="12" fill="#6b6f78">Has cash</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="125" y1="160" x2="140" y2="160"/>
    <polygon points="140,153 153,160 140,167"/>
  </g>

  <!-- Stage 2: Agent -->
  <g>
    <rect x="155" y="95" width="110" height="130" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="210" cy="135" r="22" fill="#f59e0b"/>
    <!-- shop icon -->
    <path d="M198 128 h24 l-2 7 h-20 z" fill="#ffffff"/>
    <rect x="200" y="135" width="20" height="13" rx="1.5" fill="#ffffff"/>
    <text x="210" y="177" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Agent</text>
    <text x="210" y="195" text-anchor="middle" font-size="12" fill="#6b6f78">Takes cash,</text>
    <text x="210" y="210" text-anchor="middle" font-size="12" fill="#6b6f78">tops up float</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="265" y1="160" x2="280" y2="160"/>
    <polygon points="280,153 293,160 280,167"/>
  </g>

  <!-- Stage 3: Mobile Wallet -->
  <g>
    <rect x="295" y="87" width="110" height="146" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="2"/>
    <!-- phone icon -->
    <rect x="333" y="117" width="34" height="58" rx="6" fill="#1f9d57"/>
    <rect x="337" y="123" width="26" height="40" rx="2" fill="#ecfaf2"/>
    <circle cx="350" cy="169" r="2.5" fill="#ecfaf2"/>
    <text x="350" y="201" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Wallet</text>
    <text x="350" y="219" text-anchor="middle" font-size="12" fill="#6b6f78">E-money stored</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="405" y1="160" x2="420" y2="160"/>
    <polygon points="420,153 433,160 420,167"/>
  </g>

  <!-- Stage 4: National Switch -->
  <g>
    <rect x="435" y="95" width="110" height="130" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <circle cx="490" cy="135" r="22" fill="#6b6f78"/>
    <!-- switch icon -->
    <rect x="478" y="127" width="24" height="16" rx="3" fill="#ffffff"/>
    <circle cx="484" cy="135" r="3" fill="#6b6f78"/>
    <circle cx="496" cy="135" r="3" fill="#6b6f78"/>
    <text x="490" y="177" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Switch</text>
    <text x="490" y="195" text-anchor="middle" font-size="12" fill="#6b6f78">Routes payments</text>
  </g>

  <!-- arrow 4 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="545" y1="160" x2="560" y2="160"/>
    <polygon points="560,153 573,160 560,167"/>
  </g>

  <!-- Stage 5: Bank -->
  <g>
    <rect x="575" y="95" width="70" height="130" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <!-- bank icon -->
    <path d="M590 120 l20 -12 l20 12 v6 h-40 z" fill="#0b4f8c"/>
    <rect x="592" y="128" width="36" height="24" rx="2" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="610" y="177" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Bank</text>
    <text x="610" y="195" text-anchor="middle" font-size="12" fill="#6b6f78">Settles</text>
    <text x="610" y="210" text-anchor="middle" font-size="12" fill="#6b6f78">real funds</text>
  </g>

  <!-- footer note -->
  <text x="330" y="278" text-anchor="middle" font-size="11.5" fill="#9aa3af">The national switch lets Airtel, MTN, and banks clear payments together.</text>
</svg>
