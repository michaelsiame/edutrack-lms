<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Outlook email lifecycle: compose a message, send it, it arrives in the inbox, then the recipient replies or takes action.">
  <title>Outlook email lifecycle</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Outlook Email Lifecycle</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">What happens from the moment you click New Email</text>

  <!-- Stage 1: Compose -->
  <g>
    <rect x="28" y="92" width="130" height="150" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <!-- envelope compose -->
    <rect x="58" y="130" width="70" height="46" rx="4" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <path d="M58 134 l35 22 35 -22" fill="none" stroke="#0b4f8c" stroke-width="1.5"/>
    <line x1="68" y1="146" x2="118" y2="146" stroke="#9aa3af" stroke-width="2"/>
    <text x="93" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Compose</text>
    <text x="93" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Subject, body</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="162" y1="167" x2="186" y2="167"/>
    <polygon points="186,160 199,167 186,174"/>
  </g>

  <!-- Stage 2: Send -->
  <g>
    <rect x="204" y="92" width="130" height="150" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <!-- send icon -->
    <circle cx="269" cy="155" r="28" fill="#1f9d57"/>
    <path d="M258 149 l22 6 -22 6 4 -6 z" fill="#ffffff"/>
    <text x="269" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Send</text>
    <text x="269" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Outlook dispatches</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="338" y1="167" x2="362" y2="167"/>
    <polygon points="362,160 375,167 362,174"/>
  </g>

  <!-- Stage 3: Inbox -->
  <g>
    <rect x="380" y="92" width="130" height="150" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <!-- inbox tray -->
    <path d="M420 140 h50 l-10 30 h-30 z" fill="#ffffff" stroke="#9aa3af" stroke-width="1.5"/>
    <rect x="428" y="130" width="34" height="16" rx="2" fill="#ffffff" stroke="#9aa3af" stroke-width="1.5"/>
    <text x="445" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Inbox</text>
    <text x="445" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Receiver reads it</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="514" y1="167" x2="538" y2="167"/>
    <polygon points="538,160 551,167 538,174"/>
  </g>

  <!-- Stage 4: Reply / Action -->
  <g>
    <rect x="556" y="92" width="86" height="150" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- reply arrows -->
    <path d="M585 148 h18 v-8 l12 14 -12 14 v-8 h-18 z" fill="#f59e0b"/>
    <path d="M585 172 h28" stroke="#9aa3af" stroke-width="2.5"/>
    <text x="599" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Reply</text>
    <text x="599" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">or action</text>
  </g>

  <!-- footer note -->
  <text x="330" y="282" text-anchor="middle" font-size="11.5" fill="#9aa3af">Use Cc and Bcc wisely, and keep the subject line clear for faster responses.</text>
</svg>
