<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Word document production flow: draft the content, format the page, review and correct, then share or print.">
  <title>Document production flow in Word</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Document Production Flow</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">How a raw draft becomes a polished Word document</text>

  <!-- Stage 1: Draft -->
  <g>
    <rect x="28" y="92" width="130" height="150" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <!-- document icon -->
    <rect x="68" y="122" width="50" height="66" rx="4" fill="#ffffff" stroke="#9aa3af" stroke-width="1.5"/>
    <line x1="78" y1="140" x2="108" y2="140" stroke="#9aa3af" stroke-width="2"/>
    <line x1="78" y1="152" x2="108" y2="152" stroke="#9aa3af" stroke-width="2"/>
    <line x1="78" y1="164" x2="98" y2="164" stroke="#9aa3af" stroke-width="2"/>
    <text x="93" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Draft</text>
    <text x="93" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Type your ideas</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="162" y1="167" x2="186" y2="167"/>
    <polygon points="186,160 199,167 186,174"/>
  </g>

  <!-- Stage 2: Format -->
  <g>
    <rect x="204" y="92" width="130" height="150" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <!-- ruler/format icon -->
    <rect x="244" y="132" width="50" height="10" rx="2" fill="#0b4f8c"/>
    <rect x="244" y="148" width="36" height="8" rx="2" fill="#9aa3af"/>
    <rect x="244" y="162" width="44" height="8" rx="2" fill="#9aa3af"/>
    <rect x="244" y="120" width="50" height="6" rx="1" fill="#d8dee6"/>
    <text x="269" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Format</text>
    <text x="269" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Styles, margins</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="338" y1="167" x2="362" y2="167"/>
    <polygon points="362,160 375,167 362,174"/>
  </g>

  <!-- Stage 3: Review -->
  <g>
    <rect x="380" y="92" width="130" height="150" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- checkmark icon -->
    <circle cx="445" cy="155" r="26" fill="#f59e0b"/>
    <path d="M435 154 l7 8 14 -16" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="445" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Review</text>
    <text x="445" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Spell-check, edits</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="514" y1="167" x2="538" y2="167"/>
    <polygon points="538,160 551,167 538,174"/>
  </g>

  <!-- Stage 4: Share -->
  <g>
    <rect x="556" y="92" width="86" height="150" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <!-- share/send icon -->
    <path d="M586 130 l20 14 v8 l-20 14 v-10 l-14 6 v-28 l14 6 z" fill="#1f9d57"/>
    <text x="599" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Share</text>
    <text x="599" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Print or email</text>
  </g>

  <!-- footer note -->
  <text x="330" y="282" text-anchor="middle" font-size="11.5" fill="#9aa3af">Save versions as you move through each stage so you can undo mistakes.</text>
</svg>
