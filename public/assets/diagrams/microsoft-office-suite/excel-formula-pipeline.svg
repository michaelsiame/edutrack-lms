<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Excel formula pipeline: raw data cells feed into a formula, producing a calculated result that powers a chart.">
  <title>Excel formula pipeline</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Excel Formula Pipeline</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Turn raw data into insight: data, formula, result, chart</text>

  <!-- Stage 1: Data -->
  <g>
    <rect x="30" y="92" width="130" height="150" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <!-- spreadsheet grid -->
    <rect x="55" y="122" width="80" height="70" rx="3" fill="#ffffff" stroke="#9aa3af" stroke-width="1.5"/>
    <line x1="55" y1="140" x2="135" y2="140" stroke="#d8dee6" stroke-width="1"/>
    <line x1="55" y1="158" x2="135" y2="158" stroke="#d8dee6" stroke-width="1"/>
    <line x1="55" y1="176" x2="135" y2="176" stroke="#d8dee6" stroke-width="1"/>
    <line x1="83" y1="122" x2="83" y2="192" stroke="#d8dee6" stroke-width="1"/>
    <line x1="109" y1="122" x2="109" y2="192" stroke="#d8dee6" stroke-width="1"/>
    <text x="95" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Data</text>
    <text x="95" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Numbers in cells</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="164" y1="167" x2="188" y2="167"/>
    <polygon points="188,160 201,167 188,174"/>
  </g>

  <!-- Stage 2: Formula -->
  <g>
    <rect x="206" y="92" width="130" height="150" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <!-- formula bar -->
    <rect x="221" y="130" width="100" height="26" rx="4" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="271" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#0b4f8c" font-family="Consolas, monospace">=SUM(B2:B5)</text>
    <text x="271" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Formula</text>
    <text x="271" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Rule for Excel</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="340" y1="167" x2="364" y2="167"/>
    <polygon points="364,160 377,167 364,174"/>
  </g>

  <!-- Stage 3: Result -->
  <g>
    <rect x="382" y="92" width="130" height="150" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <!-- result cell -->
    <rect x="412" y="128" width="70" height="42" rx="6" fill="#ffffff" stroke="#1f9d57" stroke-width="2"/>
    <text x="447" y="156" text-anchor="middle" font-size="20" font-weight="700" fill="#1f9d57">K4,250</text>
    <text x="447" y="210" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Result</text>
    <text x="447" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Calculated value</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="516" y1="167" x2="540" y2="167"/>
    <polygon points="540,160 553,167 540,174"/>
  </g>

  <!-- Stage 4: Chart -->
  <g>
    <rect x="558" y="92" width="86" height="150" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- bar chart -->
    <rect x="578" y="170" width="12" height="34" rx="2" fill="#f59e0b"/>
    <rect x="595" y="150" width="12" height="54" rx="2" fill="#0b4f8c"/>
    <rect x="612" y="130" width="12" height="74" rx="2" fill="#1f9d57"/>
    <line x1="574" y1="210" x2="628" y2="210" stroke="#9aa3af" stroke-width="2"/>
    <text x="601" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">Chart</text>
  </g>

  <!-- footer note -->
  <text x="330" y="282" text-anchor="middle" font-size="11.5" fill="#9aa3af">If the source data changes, the formula result and chart update automatically.</text>
</svg>
