<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 360" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Sales funnel showing how many people see a Zambian shop's advert, show interest, and finally buy.">
  <title>Sales funnel for a small Zambian shop</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Sales Funnel for a Small Zambian Shop</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Not everyone who sees your advert will buy — and that is normal</text>

  <!-- Top layer: Awareness -->
  <g>
    <rect x="30" y="88" width="600" height="70" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="330" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Awareness — Many see your advert</text>
    <text x="330" y="142" text-anchor="middle" font-size="12" fill="#6b6f78">Facebook post, WhatsApp status, signboard at the market</text>
  </g>

  <!-- funnel side lines -->
  <line x1="90" y1="158" x2="130" y2="252" stroke="#d8dee6" stroke-width="1.5"/>
  <line x1="570" y1="158" x2="530" y2="252" stroke="#d8dee6" stroke-width="1.5"/>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="330" y1="166" x2="330" y2="186"/>
    <polygon points="323,186 330,200 337,186"/>
  </g>

  <!-- Middle layer: Interest -->
  <g>
    <rect x="70" y="202" width="520" height="70" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="330" y="236" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Interest — Some message or visit</text>
    <text x="330" y="256" text-anchor="middle" font-size="12" fill="#6b6f78">They ask price, check your catalogue, or stop at your stall</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="330" y1="280" x2="330" y2="300"/>
    <polygon points="323,300 330,314 337,300"/>
  </g>

  <!-- Bottom layer: Purchase -->
  <g>
    <rect x="130" y="316" width="400" height="40" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="2"/>
    <text x="330" y="342" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Purchase — Few pay and buy</text>
  </g>
</svg>