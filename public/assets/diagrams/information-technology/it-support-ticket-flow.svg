<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="IT support ticket flow: report an issue, log a ticket, diagnose, resolve, and close the ticket.">
  <title>The IT Support Ticket Flow</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">The IT Support Ticket Flow</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">A clear process keeps help requests organised and traceable</text>

  <!-- Stage 1: Report -->
  <g>
    <rect x="50" y="90" width="100" height="150" rx="14" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <circle cx="100" cy="130" r="20" fill="#0b4f8c"/>
    <!-- person icon -->
    <circle cx="100" cy="125" r="5" fill="#ffffff"/>
    <path d="M91 138 a8 6 0 0 1 18 0 z" fill="#ffffff"/>
    <text x="100" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Report</text>
    <text x="100" y="188" text-anchor="middle" font-size="10" fill="#6b6f78">User describes</text>
    <text x="100" y="200" text-anchor="middle" font-size="10" fill="#6b6f78">the problem</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="150" y1="165" x2="158" y2="165"/>
    <polygon points="165,165 153,158 153,172"/>
  </g>

  <!-- Stage 2: Log -->
  <g>
    <rect x="165" y="90" width="100" height="150" rx="14" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <rect x="180" y="118" width="30" height="38" rx="3" fill="#6b6f78"/>
    <rect x="183" y="122" width="24" height="30" rx="1" fill="#f7f8fa"/>
    <line x1="187" y1="128" x2="203" y2="128" stroke="#6b6f78" stroke-width="1.5"/>
    <line x1="187" y1="133" x2="200" y2="133" stroke="#6b6f78" stroke-width="1.5"/>
    <line x1="187" y1="138" x2="203" y2="138" stroke="#6b6f78" stroke-width="1.5"/>
    <circle cx="225" cy="130" r="12" fill="#ffffff" stroke="#6b6f78" stroke-width="1.5"/>
    <text x="225" y="134" text-anchor="middle" font-size="10" font-weight="700" fill="#6b6f78">#1</text>
    <text x="215" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Log</text>
    <text x="215" y="188" text-anchor="middle" font-size="10" fill="#6b6f78">Ticket is</text>
    <text x="215" y="200" text-anchor="middle" font-size="10" fill="#6b6f78">created</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="265" y1="165" x2="273" y2="165"/>
    <polygon points="280,165 268,158 268,172"/>
  </g>

  <!-- Stage 3: Diagnose -->
  <g>
    <rect x="280" y="90" width="100" height="150" rx="14" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="330" cy="130" r="20" fill="#f59e0b"/>
    <!-- magnifying glass icon -->
    <circle cx="330" cy="125" r="7" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="335" y1="130" x2="341" y2="136" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <text x="330" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Diagnose</text>
    <text x="330" y="188" text-anchor="middle" font-size="10" fill="#6b6f78">Technician</text>
    <text x="330" y="200" text-anchor="middle" font-size="10" fill="#6b6f78">investigates</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="380" y1="165" x2="388" y2="165"/>
    <polygon points="395,165 383,158 383,172"/>
  </g>

  <!-- Stage 4: Resolve -->
  <g>
    <rect x="395" y="90" width="100" height="150" rx="14" fill="#ecfaf2" stroke="#1f9d57" stroke-width="2"/>
    <circle cx="445" cy="130" r="20" fill="#1f9d57"/>
    <!-- wrench icon -->
    <path d="M438 124 l10 10 M439 137 l-3 -3 l11 -11" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="445" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Resolve</text>
    <text x="445" y="188" text-anchor="middle" font-size="10" fill="#6b6f78">Apply the</text>
    <text x="445" y="200" text-anchor="middle" font-size="10" fill="#6b6f78">fix</text>
  </g>

  <!-- arrow 4 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="495" y1="165" x2="503" y2="165"/>
    <polygon points="510,165 498,158 498,172"/>
  </g>

  <!-- Stage 5: Close -->
  <g>
    <rect x="510" y="90" width="100" height="150" rx="14" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <circle cx="560" cy="130" r="20" fill="#6b6f78"/>
    <!-- checkmark icon -->
    <path d="M551 129 l6 7 12 -14" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="560" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Close</text>
    <text x="560" y="188" text-anchor="middle" font-size="10" fill="#6b6f78">Confirm and</text>
    <text x="560" y="200" text-anchor="middle" font-size="10" fill="#6b6f78">close ticket</text>
  </g>

  <!-- footer note -->
  <text x="330" y="274" text-anchor="middle" font-size="11.5" fill="#9aa3af">Every step is recorded so future issues can be solved faster.</text>
</svg>
