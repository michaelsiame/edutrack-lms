<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Java method flow: a call passes parameters, the method body runs, and a value is returned to the caller.">
  <title>How a Java Method Works</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">How a Java Method Works</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Call, pass values, execute, then return the result</text>

  <!-- Stage 1: Call -->
  <g>
    <rect x="30" y="108" width="120" height="118" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="90" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Call</text>
    <text x="90" y="172" text-anchor="middle" font-size="12" fill="#6b6f78">total =</text>
    <text x="90" y="190" text-anchor="middle" font-size="12" fill="#6b6f78">add(5, 3)</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="154" y1="167" x2="178" y2="167"/>
    <polygon points="178,160 191,167 178,174"/>
  </g>

  <!-- Stage 2: Parameters -->
  <g>
    <rect x="198" y="108" width="120" height="118" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="258" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Parameters</text>
    <text x="258" y="172" text-anchor="middle" font-size="12" fill="#6b6f78">a = 5</text>
    <text x="258" y="190" text-anchor="middle" font-size="12" fill="#6b6f78">b = 3</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="322" y1="167" x2="346" y2="167"/>
    <polygon points="346,160 359,167 346,174"/>
  </g>

  <!-- Stage 3: Method Body -->
  <g>
    <rect x="366" y="108" width="120" height="118" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <text x="426" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Method Body</text>
    <text x="426" y="172" text-anchor="middle" font-size="12" fill="#6b6f78">int sum =</text>
    <text x="426" y="190" text-anchor="middle" font-size="12" fill="#6b6f78">a + b</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="490" y1="167" x2="514" y2="167"/>
    <polygon points="514,160 527,167 514,174"/>
  </g>

  <!-- Stage 4: Return Value -->
  <g>
    <rect x="540" y="108" width="120" height="118" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="600" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Return</text>
    <text x="600" y="172" text-anchor="middle" font-size="12" fill="#6b6f78">return sum</text>
    <text x="600" y="190" text-anchor="middle" font-size="12" fill="#6b6f78">total = 8</text>
  </g>

  <!-- return arrow curving back -->
  <g stroke="#1f9d57" stroke-width="2" fill="none" stroke-dasharray="5,4">
    <path d="M600 226 v16 a8 8 0 0 1 -8 8 h-420 a8 8 0 0 1 -8 -8 v-16"/>
  </g>
  <polygon points="164,242 164,232 172,237" fill="#1f9d57" stroke="none"/>

  <!-- footer note -->
  <text x="330" y="284" text-anchor="middle" font-size="11.5" fill="#9aa3af">Methods let you reuse logic: define once, call many times with different values.</text>
</svg>
