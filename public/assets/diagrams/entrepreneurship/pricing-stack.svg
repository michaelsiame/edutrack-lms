<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Pricing stack showing cost, profit margin and VAT adding up to the final selling price.">
  <title>Pricing for Profit: Building the Price</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Pricing for Profit: Building the Price</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Every selling price is made of cost, profit, and tax — know each layer</text>

  <!-- VAT layer -->
  <rect x="100" y="86" width="260" height="36" rx="8" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="115" y="110" font-size="13" font-weight="700" fill="#0a1628">VAT</text>
  <text x="160" y="110" font-size="12" fill="#6b6f78">(if you are registered with ZRA)</text>

  <!-- Profit layer -->
  <rect x="100" y="128" width="260" height="36" rx="8" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
  <text x="115" y="152" font-size="13" font-weight="700" fill="#0a1628">Profit margin</text>
  <text x="215" y="152" font-size="12" fill="#6b6f78">Your reward for risk and effort</text>

  <!-- Cost layer -->
  <rect x="100" y="170" width="260" height="36" rx="8" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
  <text x="115" y="194" font-size="13" font-weight="700" fill="#0a1628">Costs</text>
  <text x="160" y="194" font-size="12" fill="#6b6f78">Materials + labour + overheads</text>

  <!-- plus signs -->
  <text x="78" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#9aa3af">+</text>
  <text x="78" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#9aa3af">+</text>

  <!-- equals sign -->
  <text x="375" y="165" text-anchor="middle" font-size="20" font-weight="700" fill="#6b6f78">=</text>

  <!-- final price tag -->
  <rect x="390" y="105" width="170" height="115" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
  <text x="475" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Selling Price</text>
  <text x="475" y="180" text-anchor="middle" font-size="28" font-weight="700" fill="#0b4f8c">K55</text>
  <text x="475" y="203" text-anchor="middle" font-size="11" fill="#6b6f78">Example tray of chickens</text>

  <!-- footer note -->
  <text x="330" y="268" text-anchor="middle" font-size="11.5" fill="#9aa3af">If your price only covers cost, you are running a charity, not a business.</text>
</svg>