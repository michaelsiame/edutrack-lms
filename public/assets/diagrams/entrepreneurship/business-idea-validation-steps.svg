<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Five step validation process: idea, assumptions, quick test, feedback, then decide go or stop.">
  <title>Test Your Idea Before You Spend Money</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Test Your Idea Before You Spend Money</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Validate in days, not months, so you only invest in ideas that work</text>

  <!-- Idea -->
  <g>
    <rect x="30" y="80" width="110" height="150" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <circle cx="85" cy="115" r="18" fill="#0b4f8c"/>
    <circle cx="85" cy="110" r="7" fill="#ffffff"/>
    <rect x="81" y="118" width="8" height="9" rx="2" fill="#ffffff"/>
    <text x="85" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Idea</text>
    <text x="85" y="174" text-anchor="middle" font-size="11" fill="#6b6f78">What problem</text>
    <text x="85" y="188" text-anchor="middle" font-size="11" fill="#6b6f78">are you solving?</text>
  </g>

  <!-- Assumptions -->
  <g>
    <rect x="145" y="80" width="110" height="150" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <rect x="170" y="104" width="40" height="30" rx="3" fill="#9aa3af"/>
    <rect x="174" y="108" width="32" height="22" rx="2" fill="#ffffff"/>
    <line x1="178" y1="116" x2="202" y2="116" stroke="#9aa3af" stroke-width="2"/>
    <line x1="178" y1="122" x2="196" y2="122" stroke="#9aa3af" stroke-width="2"/>
    <text x="200" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Assumptions</text>
    <text x="200" y="174" text-anchor="middle" font-size="11" fill="#6b6f78">Who will pay?</text>
    <text x="200" y="188" text-anchor="middle" font-size="11" fill="#6b6f78">How much?</text>
  </g>

  <!-- Quick Test -->
  <g>
    <rect x="260" y="80" width="110" height="150" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="290" y="106" width="32" height="24" rx="3" fill="#f59e0b"/>
    <path d="M298 114 l6 6 l12 -12" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="315" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Quick Test</text>
    <text x="315" y="174" text-anchor="middle" font-size="11" fill="#6b6f78">Sell one or</text>
    <text x="315" y="188" text-anchor="middle" font-size="11" fill="#6b6f78">ask for orders</text>
    <text x="315" y="202" text-anchor="middle" font-size="11" fill="#6b6f78">before scaling</text>
  </g>

  <!-- Feedback -->
  <g>
    <rect x="375" y="80" width="110" height="150" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <rect x="403" y="108" width="28" height="22" rx="5" fill="#1f9d57"/>
    <polygon points="410,128 417,136 424,128" fill="#ffffff"/>
    <text x="430" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Feedback</text>
    <text x="430" y="174" text-anchor="middle" font-size="11" fill="#6b6f78">Listen to real</text>
    <text x="430" y="188" text-anchor="middle" font-size="11" fill="#6b6f78">customers, not</text>
    <text x="430" y="202" text-anchor="middle" font-size="11" fill="#6b6f78">just friends</text>
  </g>

  <!-- Decide -->
  <g>
    <rect x="490" y="80" width="110" height="150" rx="16" fill="#fdecec" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="545" cy="115" r="18" fill="#dc2626"/>
    <path d="M536 115 h18 M545 106 v18" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <text x="545" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Decide</text>
    <text x="545" y="174" text-anchor="middle" font-size="11" fill="#6b6f78">Go if they pay,</text>
    <text x="545" y="188" text-anchor="middle" font-size="11" fill="#6b6f78">pivot if they</text>
    <text x="545" y="202" text-anchor="middle" font-size="11" fill="#6b6f78">only say maybe</text>
  </g>

  <!-- arrows between cards -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="140" y1="155" x2="141" y2="155"/>
    <polygon points="141,148 153,155 141,162"/>
    <line x1="255" y1="155" x2="256" y2="155"/>
    <polygon points="256,148 268,155 256,162"/>
    <line x1="370" y1="155" x2="371" y2="155"/>
    <polygon points="371,148 383,155 371,162"/>
    <line x1="485" y1="155" x2="486" y2="155"/>
    <polygon points="486,148 498,155 486,162"/>
  </g>

  <!-- footer note -->
  <text x="330" y="268" text-anchor="middle" font-size="11.5" fill="#9aa3af">A failed quick test is cheap; a failed full launch is expensive.</text>
</svg>