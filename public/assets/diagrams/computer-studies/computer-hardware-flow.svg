<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The information processing cycle: input devices feed data to the CPU, which produces output and saves data in storage for later reuse.">
  <title>The Computer Information Processing Cycle</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">The Information Processing Cycle</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Input, process, output, and storage work together continuously</text>

  <!-- Stage 1: Input -->
  <g>
    <rect x="30" y="80" width="135" height="160" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <circle cx="97.5" cy="125" r="26" fill="#0b4f8c"/>
    <!-- keyboard icon -->
    <rect x="83" y="115" width="29" height="20" rx="2" fill="#ffffff"/>
    <line x1="87" y1="121" x2="108" y2="121" stroke="#0b4f8c" stroke-width="1.5"/>
    <line x1="87" y1="127" x2="104" y2="127" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="97.5" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Input</text>
    <text x="97.5" y="194" text-anchor="middle" font-size="12" fill="#6b6f78">Keyboard, mouse,</text>
    <text x="97.5" y="209" text-anchor="middle" font-size="12" fill="#6b6f78">scanner, microphone</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="165" y1="160" x2="175" y2="160"/>
    <polygon points="181,160 169,153 169,167"/>
  </g>

  <!-- Stage 2: Processing -->
  <g>
    <rect x="185" y="80" width="135" height="160" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="2"/>
    <circle cx="252.5" cy="125" r="26" fill="#1f9d57"/>
    <!-- CPU chip icon -->
    <rect x="241" y="114" width="23" height="23" rx="2" fill="#ffffff"/>
    <line x1="237" y1="119" x2="241" y2="119" stroke="#ffffff" stroke-width="2"/>
    <line x1="237" y1="125" x2="241" y2="125" stroke="#ffffff" stroke-width="2"/>
    <line x1="237" y1="131" x2="241" y2="131" stroke="#ffffff" stroke-width="2"/>
    <line x1="264" y1="119" x2="268" y2="119" stroke="#ffffff" stroke-width="2"/>
    <line x1="264" y1="125" x2="268" y2="125" stroke="#ffffff" stroke-width="2"/>
    <line x1="264" y1="131" x2="268" y2="131" stroke="#ffffff" stroke-width="2"/>
    <line x1="246" y1="110" x2="246" y2="114" stroke="#ffffff" stroke-width="2"/>
    <line x1="252.5" y1="110" x2="252.5" y2="114" stroke="#ffffff" stroke-width="2"/>
    <line x1="259" y1="110" x2="259" y2="114" stroke="#ffffff" stroke-width="2"/>
    <line x1="246" y1="137" x2="246" y2="141" stroke="#ffffff" stroke-width="2"/>
    <line x1="252.5" y1="137" x2="252.5" y2="141" stroke="#ffffff" stroke-width="2"/>
    <line x1="259" y1="137" x2="259" y2="141" stroke="#ffffff" stroke-width="2"/>
    <text x="252.5" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Processing</text>
    <text x="252.5" y="194" text-anchor="middle" font-size="12" fill="#6b6f78">CPU calculates and</text>
    <text x="252.5" y="209" text-anchor="middle" font-size="12" fill="#6b6f78">makes decisions</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="320" y1="160" x2="330" y2="160"/>
    <polygon points="336,160 324,153 324,167"/>
  </g>

  <!-- Stage 3: Output -->
  <g>
    <rect x="340" y="80" width="135" height="160" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="407.5" cy="125" r="26" fill="#f59e0b"/>
    <!-- monitor icon -->
    <rect x="393" y="112" width="29" height="22" rx="2" fill="#ffffff"/>
    <rect x="402" y="134" width="11" height="6" fill="#ffffff"/>
    <line x1="393" y1="140" x2="422" y2="140" stroke="#ffffff" stroke-width="2"/>
    <text x="407.5" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Output</text>
    <text x="407.5" y="194" text-anchor="middle" font-size="12" fill="#6b6f78">Monitor, printer,</text>
    <text x="407.5" y="209" text-anchor="middle" font-size="12" fill="#6b6f78">speakers, projector</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="475" y1="160" x2="485" y2="160"/>
    <polygon points="491,160 479,153 479,167"/>
  </g>

  <!-- Stage 4: Storage -->
  <g>
    <rect x="495" y="80" width="135" height="160" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <circle cx="562.5" cy="125" r="26" fill="#6b6f78"/>
    <!-- disk icon -->
    <circle cx="562.5" cy="125" r="12" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="562.5" cy="125" r="3.5" fill="#ffffff"/>
    <text x="562.5" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Storage</text>
    <text x="562.5" y="194" text-anchor="middle" font-size="12" fill="#6b6f78">SSD, USB drive,</text>
    <text x="562.5" y="209" text-anchor="middle" font-size="12" fill="#6b6f78">or cloud storage</text>
  </g>

  <!-- feedback arrow from storage back to input -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <path d="M562.5 245 C562.5 270 97.5 270 97.5 245" fill="none"/>
    <polygon points="97.5,252 84,245 97.5,238"/>
  </g>

  <!-- footer note -->
  <text x="330" y="284" text-anchor="middle" font-size="11.5" fill="#9aa3af">Storage feeds saved data back into the cycle so it can be processed again.</text>
</svg>
