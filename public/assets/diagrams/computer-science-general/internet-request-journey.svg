<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Journey of a web request: browser asks DNS for an IP, contacts the server, receives packets, and renders the page.">
  <title>How a Web Page Loads</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">How a Web Page Loads</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">From a typed URL to a rendered page in milliseconds</text>

  <!-- Stage 1: Browser -->
  <g>
    <rect x="31" y="85" width="110" height="150" rx="14" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <rect x="51" y="112" width="70" height="50" rx="4" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <rect x="51" y="112" width="70" height="10" rx="2" fill="#0b4f8c"/>
    <text x="58" y="143" font-size="9" fill="#6b6f78">edutrack...</text>
    <text x="86" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Browser</text>
    <text x="86" y="202" text-anchor="middle" font-size="10" fill="#6b6f78">Types the</text>
    <text x="86" y="214" text-anchor="middle" font-size="10" fill="#6b6f78">web address</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="141" y1="160" x2="147" y2="160"/>
    <polygon points="153,160 141,153 141,167"/>
  </g>

  <!-- Stage 2: DNS -->
  <g>
    <rect x="153" y="85" width="110" height="150" rx="14" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="208" cy="135" r="22" fill="#f59e0b"/>
    <!-- phonebook icon -->
    <rect x="198" y="126" width="20" height="18" rx="2" fill="#ffffff"/>
    <line x1="201" y1="131" x2="215" y2="131" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="201" y1="135" x2="213" y2="135" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="201" y1="139" x2="215" y2="139" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="208" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">DNS</text>
    <text x="208" y="202" text-anchor="middle" font-size="10" fill="#6b6f78">Name to IP</text>
    <text x="208" y="214" text-anchor="middle" font-size="10" fill="#6b6f78">address lookup</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="263" y1="160" x2="269" y2="160"/>
    <polygon points="275,160 263,153 263,167"/>
  </g>

  <!-- Stage 3: Server -->
  <g>
    <rect x="275" y="85" width="110" height="150" rx="14" fill="#ecfaf2" stroke="#1f9d57" stroke-width="2"/>
    <rect x="295" y="115" width="28" height="44" rx="2" fill="#1f9d57"/>
    <rect x="300" y="120" width="18" height="6" rx="1" fill="#ecfaf2"/>
    <rect x="300" y="130" width="18" height="6" rx="1" fill="#ecfaf2"/>
    <rect x="300" y="140" width="18" height="6" rx="1" fill="#ecfaf2"/>
    <rect x="330" y="128" width="36" height="18" rx="2" fill="#ffffff" stroke="#1f9d57" stroke-width="1"/>
    <text x="348" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#1f9d57">IP</text>
    <text x="330" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Server</text>
    <text x="330" y="202" text-anchor="middle" font-size="10" fill="#6b6f78">Finds the</text>
    <text x="330" y="214" text-anchor="middle" font-size="10" fill="#6b6f78">requested files</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="385" y1="160" x2="391" y2="160"/>
    <polygon points="397,160 385,153 385,167"/>
  </g>

  <!-- Stage 4: Packets -->
  <g>
    <rect x="397" y="85" width="110" height="150" rx="14" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <rect x="415" y="118" width="24" height="18" rx="2" fill="#ffffff" stroke="#6b6f78" stroke-width="1.5"/>
    <text x="427" y="130" text-anchor="middle" font-size="9" font-weight="700" fill="#6b6f78">1</text>
    <rect x="443" y="130" width="24" height="18" rx="2" fill="#ffffff" stroke="#6b6f78" stroke-width="1.5"/>
    <text x="455" y="142" text-anchor="middle" font-size="9" font-weight="700" fill="#6b6f78">2</text>
    <rect x="429" y="146" width="24" height="18" rx="2" fill="#ffffff" stroke="#6b6f78" stroke-width="1.5"/>
    <text x="441" y="158" text-anchor="middle" font-size="9" font-weight="700" fill="#6b6f78">3</text>
    <text x="452" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Packets</text>
    <text x="452" y="202" text-anchor="middle" font-size="10" fill="#6b6f78">Data split into</text>
    <text x="452" y="214" text-anchor="middle" font-size="10" fill="#6b6f78">small chunks</text>
  </g>

  <!-- arrow 4 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="507" y1="160" x2="513" y2="160"/>
    <polygon points="519,160 507,153 507,167"/>
  </g>

  <!-- Stage 5: Render -->
  <g>
    <rect x="519" y="85" width="110" height="150" rx="14" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <rect x="539" y="112" width="70" height="50" rx="4" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <rect x="539" y="112" width="70" height="10" rx="2" fill="#0b4f8c"/>
    <line x1="545" y1="130" x2="603" y2="130" stroke="#d8dee6" stroke-width="2"/>
    <line x1="545" y1="138" x2="590" y2="138" stroke="#d8dee6" stroke-width="2"/>
    <line x1="545" y1="146" x2="580" y2="146" stroke="#d8dee6" stroke-width="2"/>
    <text x="574" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Render</text>
    <text x="574" y="202" text-anchor="middle" font-size="10" fill="#6b6f78">Browser builds</text>
    <text x="574" y="214" text-anchor="middle" font-size="10" fill="#6b6f78">the final page</text>
  </g>

  <!-- footer note -->
  <text x="330" y="270" text-anchor="middle" font-size="11.5" fill="#9aa3af">Packets may take different routes across the internet before reassembling.</text>
</svg>
