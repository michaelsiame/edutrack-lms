<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Colour wheel showing complementary pairs: red opposite green, amber opposite navy.">
  <title>Colour Harmony for Local Designs</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Colour Harmony for Local Designs</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Pair opposite colours on the wheel to make text and buttons stand out</text>

  <!-- wheel background -->
  <circle cx="250" cy="170" r="85" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>

  <!-- cross lines showing opposites -->
  <g stroke="#9aa3af" stroke-width="2.5">
    <line x1="250" y1="100" x2="250" y2="240"/>
    <line x1="180" y1="170" x2="320" y2="170"/>
  </g>

  <!-- red -->
  <circle cx="250" cy="100" r="22" fill="#dc2626"/>
  <text x="250" y="136" text-anchor="middle" font-size="12" font-weight="700" fill="#0a1628">Red</text>

  <!-- green -->
  <circle cx="250" cy="240" r="22" fill="#1f9d57"/>
  <text x="250" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#0a1628">Green</text>

  <!-- amber -->
  <circle cx="180" cy="170" r="22" fill="#f59e0b"/>
  <text x="180" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#0a1628">Amber</text>

  <!-- navy -->
  <circle cx="320" cy="170" r="22" fill="#0b4f8c"/>
  <text x="320" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#0a1628">Navy</text>

  <!-- centre label -->
  <circle cx="250" cy="170" r="18" fill="#ffffff" stroke="#d8dee6" stroke-width="1.5"/>
  <text x="250" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#6b6f78">WHEEL</text>

  <!-- usage legend card -->
  <rect x="395" y="95" width="245" height="150" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
  <text x="517" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Using Colour in Zambia</text>

  <!-- warm group -->
  <rect x="415" y="138" width="24" height="24" rx="4" fill="#dc2626"/>
  <rect x="443" y="138" width="24" height="24" rx="4" fill="#f59e0b"/>
  <text x="475" y="148" font-size="12" font-weight="700" fill="#0a1628">Warm</text>
  <text x="475" y="163" font-size="11" fill="#6b6f78">Energy, food, sales, urgency</text>

  <!-- cool group -->
  <rect x="415" y="182" width="24" height="24" rx="4" fill="#0b4f8c"/>
  <rect x="443" y="182" width="24" height="24" rx="4" fill="#1f9d57"/>
  <text x="475" y="192" font-size="12" font-weight="700" fill="#0a1628">Cool</text>
  <text x="475" y="207" font-size="11" fill="#6b6f78">Trust, health, finance, calm</text>

  <!-- pair tip -->
  <text x="517" y="238" text-anchor="middle" font-size="11.5" fill="#9aa3af">Red + green or amber + navy = strong contrast</text>
</svg>