<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 340" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="A desktop computer system unit connected to common peripherals and the ports they use.">
  <title>Computer Ports and Peripherals</title>

  <!-- title -->
  <text x="330" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Computer Ports and Peripherals</text>
  <text x="330" y="54" text-anchor="middle" font-size="13" fill="#6b6f78">How input, output and storage devices connect to the system unit</text>

  <!-- System unit -->
  <g>
    <rect x="260" y="115" width="140" height="160" rx="12" fill="#f7f8fa" stroke="#0b4f8c" stroke-width="2"/>
    <rect x="270" y="125" width="120" height="100" rx="4" fill="#ffffff" stroke="#d8dee6" stroke-width="1.5"/>
    <circle cx="330" cy="250" r="12" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <rect x="318" y="248" width="24" height="4" rx="1" fill="#0b4f8c"/>
    <!-- ports on front -->
    <rect x="280" y="235" width="14" height="6" rx="1" fill="#9aa3af"/>
    <rect x="300" y="235" width="14" height="6" rx="1" fill="#9aa3af"/>
    <circle cx="362" cy="238" r="4" fill="#9aa3af"/>
    <text x="330" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">System Unit</text>
    <text x="330" y="190" text-anchor="middle" font-size="12" fill="#6b6f78">CPU, RAM, storage</text>
    <text x="330" y="208" text-anchor="middle" font-size="12" fill="#6b6f78">and ports</text>
  </g>

  <!-- Monitor (top) connected by HDMI -->
  <g>
    <rect x="290" y="70" width="80" height="50" rx="4" fill="#ffffff" stroke="#1f9d57" stroke-width="1.5"/>
    <rect x="298" y="78" width="64" height="34" rx="2" fill="#ecfaf2" stroke="none"/>
    <line x1="305" y1="88" x2="355" y2="88" stroke="#1f9d57" stroke-width="2"/>
    <line x1="305" y1="98" x2="345" y2="98" stroke="#1f9d57" stroke-width="2"/>
    <rect x="325" y="120" width="10" height="10" fill="none" stroke="#9aa3af" stroke-width="2"/>
    <text x="330" y="66" text-anchor="middle" font-size="12" font-weight="600" fill="#0a1628">Monitor</text>
    <text x="330" y="142" text-anchor="middle" font-size="11" fill="#6b6f78">HDMI</text>
  </g>

  <!-- Keyboard (left) connected by USB -->
  <g>
    <rect x="50" y="160" width="90" height="40" rx="4" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <line x1="58" y1="172" x2="132" y2="172" stroke="#0b4f8c" stroke-width="2"/>
    <line x1="58" y1="184" x2="120" y2="184" stroke="#0b4f8c" stroke-width="2"/>
    <line x1="145" y1="180" x2="255" y2="180" stroke="#9aa3af" stroke-width="2"/>
    <polygon points="255,173 268,180 255,187" fill="#9aa3af"/>
    <text x="95" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#0a1628">Keyboard</text>
    <text x="200" y="172" text-anchor="middle" font-size="11" fill="#6b6f78">USB</text>
  </g>

  <!-- Mouse (bottom left) connected by USB -->
  <g>
    <ellipse cx="110" cy="280" rx="22" ry="30" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <line x1="110" y1="265" x2="110" y2="275" stroke="#f59e0b" stroke-width="1.5"/>
    <path d="M132 280 Q180 280 255 250" fill="none" stroke="#9aa3af" stroke-width="2"/>
    <polygon points="255,243 268,250 255,257" fill="#9aa3af"/>
    <text x="110" y="325" text-anchor="middle" font-size="12" font-weight="600" fill="#0a1628">Mouse</text>
    <text x="200" y="272" text-anchor="middle" font-size="11" fill="#6b6f78">USB</text>
  </g>

  <!-- Printer (right) connected by USB -->
  <g>
    <rect x="510" y="150" width="90" height="60" rx="4" fill="#ffffff" stroke="#1f9d57" stroke-width="1.5"/>
    <rect x="520" y="165" width="70" height="30" rx="2" fill="#ecfaf2" stroke="none"/>
    <circle cx="575" cy="160" r="5" fill="#1f9d57"/>
    <line x1="400" y1="180" x2="505" y2="180" stroke="#9aa3af" stroke-width="2"/>
    <polygon points="505,173 518,180 505,187" fill="#9aa3af"/>
    <text x="555" y="140" text-anchor="middle" font-size="12" font-weight="600" fill="#0a1628">Printer</text>
    <text x="450" y="172" text-anchor="middle" font-size="11" fill="#6b6f78">USB</text>
  </g>

  <!-- USB flash drive (bottom right) connected by USB -->
  <g>
    <rect x="530" y="265" width="50" height="26" rx="3" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <rect x="575" y="270" width="18" height="16" rx="1" fill="#9aa3af"/>
    <rect x="578" y="273" width="4" height="10" rx="1" fill="#ffffff"/>
    <rect x="584" y="273" width="4" height="10" rx="1" fill="#ffffff"/>
    <line x1="400" y1="230" x2="520" y2="275" stroke="#9aa3af" stroke-width="2"/>
    <polygon points="520,268 533,275 520,282" fill="#9aa3af"/>
    <text x="555" y="315" text-anchor="middle" font-size="12" font-weight="600" fill="#0a1628">USB Drive</text>
    <text x="460" y="245" text-anchor="middle" font-size="11" fill="#6b6f78">USB</text>
  </g>

  <!-- footer -->
  <text x="330" y="335" text-anchor="middle" font-size="11.5" fill="#9aa3af">Match the cable and connector to the correct port before plugging in a device.</text>
</svg>