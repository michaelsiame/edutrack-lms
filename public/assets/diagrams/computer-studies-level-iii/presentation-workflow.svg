<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Presentation workflow: plan the message, build the slides, format and animate, then present to the audience.">
  <title>Presentation Workflow</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Presentation Workflow</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Plan, build, format and deliver a slide deck</text>

  <!-- Plan -->
  <g>
    <rect x="40" y="95" width="120" height="160" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <text x="100" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Plan</text>
    <circle cx="100" cy="160" r="22" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="100" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#0b4f8c">1</text>
    <text x="100" y="200" text-anchor="middle" font-size="12" fill="#6b6f78">Audience</text>
    <text x="100" y="216" text-anchor="middle" font-size="12" fill="#6b6f78">purpose</text>
    <text x="100" y="232" text-anchor="middle" font-size="12" fill="#6b6f78">and key points</text>
  </g>

  <!-- arrow -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="164" y1="175" x2="186" y2="175"/>
    <polygon points="186,168 199,175 186,182"/>
  </g>

  <!-- Build Slides -->
  <g>
    <rect x="205" y="95" width="120" height="160" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="265" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Build Slides</text>
    <rect x="235" y="150" width="60" height="42" rx="3" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <line x1="242" y1="162" x2="288" y2="162" stroke="#0b4f8c" stroke-width="2"/>
    <line x1="242" y1="174" x2="278" y2="174" stroke="#9aa3af" stroke-width="2"/>
    <text x="265" y="208" text-anchor="middle" font-size="12" fill="#6b6f78">Add content</text>
    <text x="265" y="224" text-anchor="middle" font-size="12" fill="#6b6f78">to each slide</text>
  </g>

  <!-- arrow -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="329" y1="175" x2="351" y2="175"/>
    <polygon points="351,168 364,175 351,182"/>
  </g>

  <!-- Format and Animate -->
  <g>
    <rect x="370" y="95" width="120" height="160" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="430" y="124" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Format and</text>
    <text x="430" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Animate</text>
    <rect x="395" y="160" width="70" height="36" rx="4" fill="#f59e0b"/>
    <text x="430" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Design</text>
    <text x="430" y="212" text-anchor="middle" font-size="12" fill="#6b6f78">Colours, fonts</text>
    <text x="430" y="228" text-anchor="middle" font-size="12" fill="#6b6f78">and transitions</text>
  </g>

  <!-- arrow -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="494" y1="175" x2="516" y2="175"/>
    <polygon points="516,168 529,175 516,182"/>
  </g>

  <!-- Present -->
  <g>
    <rect x="535" y="95" width="100" height="160" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="585" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Present</text>
    <!-- speaker/podium icon -->
    <rect x="565" y="155" width="40" height="26" rx="2" fill="#1f9d57"/>
    <rect x="575" y="181" width="20" height="18" fill="#ffffff" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="585" y="215" text-anchor="middle" font-size="12" fill="#6b6f78">Speak clearly</text>
    <text x="585" y="231" text-anchor="middle" font-size="12" fill="#6b6f78">and engage</text>
  </g>

  <!-- footer -->
  <text x="330" y="282" text-anchor="middle" font-size="11.5" fill="#9aa3af">Rehearse once before presenting so your timing and slides match.</text>
</svg>