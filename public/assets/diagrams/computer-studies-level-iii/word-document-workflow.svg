<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Word document workflow: type the draft, format the text, proofread for errors, set pagination, save the file, and print or share.">
  <title>Word Document Workflow</title>

  <!-- title -->
  <text x="370" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Word Document Workflow</text>
  <text x="370" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">From first draft to a finished, shareable document</text>

  <!-- Type -->
  <g>
    <rect x="25" y="95" width="95" height="130" rx="12" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <text x="72" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Type</text>
    <rect x="45" y="145" width="55" height="42" rx="3" fill="#ffffff" stroke="#9aa3af" stroke-width="1.5"/>
    <line x1="52" y1="158" x2="93" y2="158" stroke="#9aa3af" stroke-width="2"/>
    <line x1="52" y1="170" x2="93" y2="170" stroke="#9aa3af" stroke-width="2"/>
    <line x1="52" y1="182" x2="83" y2="182" stroke="#9aa3af" stroke-width="2"/>
    <text x="72" y="210" text-anchor="middle" font-size="11" fill="#6b6f78">Draft ideas</text>
  </g>

  <!-- arrow -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="124" y1="160" x2="142" y2="160"/>
    <polygon points="142,153 155,160 142,167"/>
  </g>

  <!-- Format -->
  <g>
    <rect x="160" y="95" width="95" height="130" rx="12" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="207" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Format</text>
    <rect x="180" y="148" width="55" height="8" rx="2" fill="#0b4f8c"/>
    <rect x="180" y="162" width="40" height="7" rx="2" fill="#9aa3af"/>
    <rect x="180" y="175" width="48" height="7" rx="2" fill="#9aa3af"/>
    <text x="207" y="205" text-anchor="middle" font-size="11" fill="#6b6f78">Fonts, styles</text>
  </g>

  <!-- arrow -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="259" y1="160" x2="277" y2="160"/>
    <polygon points="277,153 290,160 277,167"/>
  </g>

  <!-- Proofread -->
  <g>
    <rect x="295" y="95" width="95" height="130" rx="12" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="342" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Proofread</text>
    <circle cx="342" cy="165" r="18" fill="#f59e0b"/>
    <path d="M333 164 l6 7 12 -14" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="342" y="205" text-anchor="middle" font-size="11" fill="#6b6f78">Spell-check</text>
  </g>

  <!-- arrow -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="394" y1="160" x2="412" y2="160"/>
    <polygon points="412,153 425,160 412,167"/>
  </g>

  <!-- Paginate -->
  <g>
    <rect x="430" y="95" width="95" height="130" rx="12" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="477" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Paginate</text>
    <rect x="450" y="148" width="55" height="42" rx="3" fill="#ffffff" stroke="#1f9d57" stroke-width="1.5"/>
    <line x1="450" y1="162" x2="505" y2="162" stroke="#1f9d57" stroke-width="1"/>
    <line x1="450" y1="176" x2="505" y2="176" stroke="#1f9d57" stroke-width="1"/>
    <text x="477" y="205" text-anchor="middle" font-size="11" fill="#6b6f78">Margins, pages</text>
  </g>

  <!-- arrow -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="529" y1="160" x2="547" y2="160"/>
    <polygon points="547,153 560,160 547,167"/>
  </g>

  <!-- Save -->
  <g>
    <rect x="565" y="95" width="55" height="130" rx="12" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <text x="592" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Save</text>
    <rect x="580" y="150" width="25" height="30" rx="3" fill="#ffffff" stroke="#9aa3af" stroke-width="1.5"/>
    <rect x="584" y="154" width="17" height="8" rx="1" fill="#9aa3af"/>
    <text x="592" y="205" text-anchor="middle" font-size="11" fill="#6b6f78">File name</text>
  </g>

  <!-- arrow -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="624" y1="160" x2="642" y2="160"/>
    <polygon points="642,153 655,160 642,167"/>
  </g>

  <!-- Print -->
  <g>
    <rect x="660" y="95" width="55" height="130" rx="12" fill="#fdecec" stroke="#dc2626" stroke-width="1.5"/>
    <text x="687" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Print</text>
    <rect x="675" y="150" width="25" height="20" rx="2" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <rect x="675" y="174" width="25" height="16" rx="2" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <text x="687" y="205" text-anchor="middle" font-size="11" fill="#6b6f78">Or share</text>
  </g>

  <!-- footer -->
  <text x="370" y="282" text-anchor="middle" font-size="11.5" fill="#9aa3af">Save often while you work so you do not lose your draft.</text>
</svg>