<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 320" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Spreadsheet anatomy showing a workbook containing worksheets, a grid of rows and columns, a cell with a formula, and the resulting chart.">
  <title>Spreadsheet Anatomy</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Spreadsheet Anatomy</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Workbook, worksheet, cells, formulas and charts work together</text>

  <!-- Workbook outline -->
  <rect x="40" y="80" width="380" height="210" rx="12" fill="#f7f8fa" stroke="#0b4f8c" stroke-width="2"/>
  <text x="60" y="100" font-size="14" font-weight="700" fill="#0a1628">Workbook</text>

  <!-- formula bar -->
  <rect x="60" y="110" width="230" height="28" rx="4" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
  <text x="75" y="128" font-size="11" font-family="Consolas, monospace" fill="#0b4f8c">=SUM(B2:B3)</text>

  <!-- Worksheet grid -->
  <rect x="60" y="146" width="230" height="125" rx="4" fill="#ffffff" stroke="#d8dee6" stroke-width="1.5"/>
  <text x="80" y="166" font-size="12" font-weight="700" fill="#0a1628">Worksheet</text>

  <!-- column headers -->
  <rect x="80" y="178" width="38" height="18" fill="#eef4fb" stroke="#d8dee6" stroke-width="1"/>
  <text x="99" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#0a1628">A</text>
  <rect x="118" y="178" width="38" height="18" fill="#eef4fb" stroke="#d8dee6" stroke-width="1"/>
  <text x="137" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#0a1628">B</text>
  <rect x="156" y="178" width="38" height="18" fill="#eef4fb" stroke="#d8dee6" stroke-width="1"/>
  <text x="175" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#0a1628">C</text>
  <rect x="194" y="178" width="38" height="18" fill="#eef4fb" stroke="#d8dee6" stroke-width="1"/>
  <text x="213" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#0a1628">D</text>

  <!-- row headers -->
  <rect x="80" y="196" width="20" height="18" fill="#eef4fb" stroke="#d8dee6" stroke-width="1"/>
  <text x="90" y="208" text-anchor="middle" font-size="10" fill="#0a1628">1</text>
  <rect x="80" y="214" width="20" height="18" fill="#eef4fb" stroke="#d8dee6" stroke-width="1"/>
  <text x="90" y="226" text-anchor="middle" font-size="10" fill="#0a1628">2</text>
  <rect x="80" y="232" width="20" height="18" fill="#eef4fb" stroke="#d8dee6" stroke-width="1"/>
  <text x="90" y="244" text-anchor="middle" font-size="10" fill="#0a1628">3</text>

  <!-- data cells -->
  <rect x="100" y="196" width="56" height="18" fill="#ffffff" stroke="#d8dee6" stroke-width="1"/>
  <text x="128" y="208" text-anchor="middle" font-size="10" fill="#6b6f78">100</text>
  <rect x="156" y="196" width="38" height="18" fill="#ffffff" stroke="#d8dee6" stroke-width="1"/>
  <text x="175" y="208" text-anchor="middle" font-size="10" fill="#6b6f78">5</text>

  <rect x="100" y="214" width="56" height="18" fill="#ffffff" stroke="#d8dee6" stroke-width="1"/>
  <text x="128" y="226" text-anchor="middle" font-size="10" fill="#6b6f78">150</text>
  <rect x="156" y="214" width="38" height="18" fill="#ffffff" stroke="#d8dee6" stroke-width="1"/>
  <text x="175" y="226" text-anchor="middle" font-size="10" fill="#6b6f78">3</text>

  <!-- highlighted formula cell -->
  <rect x="194" y="214" width="38" height="18" fill="#fef6e7" stroke="#f59e0b" stroke-width="2"/>
  <text x="213" y="226" text-anchor="middle" font-size="10" font-weight="600" fill="#0a1628">250</text>

  <!-- Sheet tabs -->
  <rect x="60" y="255" width="70" height="22" rx="4" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
  <text x="95" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#0b4f8c">Sales</text>
  <rect x="135" y="255" width="70" height="22" rx="4" fill="#ffffff" stroke="#d8dee6" stroke-width="1.5"/>
  <text x="170" y="270" text-anchor="middle" font-size="11" fill="#6b6f78">Costs</text>
  <rect x="210" y="255" width="70" height="22" rx="4" fill="#ffffff" stroke="#d8dee6" stroke-width="1.5"/>
  <text x="245" y="270" text-anchor="middle" font-size="11" fill="#6b6f78">Notes</text>

  <!-- arrow to chart -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="300" y1="208" x2="325" y2="208"/>
    <polygon points="325,201 338,208 325,215"/>
  </g>

  <!-- Chart -->
  <rect x="345" y="115" width="140" height="130" rx="12" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
  <text x="415" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Chart</text>
  <line x1="360" y1="220" x2="470" y2="220" stroke="#9aa3af" stroke-width="2"/>
  <rect x="370" y="185" width="22" height="35" rx="2" fill="#f59e0b"/>
  <rect x="400" y="165" width="22" height="55" rx="2" fill="#0b4f8c"/>
  <rect x="430" y="145" width="22" height="75" rx="2" fill="#1f9d57"/>
  <text x="415" y="240" text-anchor="middle" font-size="11" fill="#6b6f78">Visual result</text>

  <!-- right-side labels -->
  <text x="510" y="130" font-size="12" font-weight="600" fill="#0a1628">Rows run</text>
  <text x="510" y="146" font-size="12" fill="#6b6f78">horizontally</text>
  <text x="510" y="175" font-size="12" font-weight="600" fill="#0a1628">Columns run</text>
  <text x="510" y="191" font-size="12" fill="#6b6f78">vertically</text>
  <text x="510" y="220" font-size="12" font-weight="600" fill="#0a1628">A cell is the</text>
  <text x="510" y="236" font-size="12" fill="#6b6f78">box where a row</text>
  <text x="510" y="252" font-size="12" fill="#6b6f78">and column meet</text>

  <!-- footer -->
  <text x="330" y="305" text-anchor="middle" font-size="11.5" fill="#9aa3af">Change the source data and the formula result and chart update together.</text>
</svg>