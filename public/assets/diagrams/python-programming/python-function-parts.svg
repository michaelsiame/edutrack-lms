<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Parts of a Python function: definition line with parameters, indented body, and a returned value sent back to the caller.">
  <title>Parts of a Python Function</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Parts of a Python Function</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">A reusable block of code that accepts input and returns a result</text>

  <!-- Function card background -->
  <rect x="50" y="82" width="560" height="170" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>

  <!-- Step 1: def line -->
  <g>
    <rect x="70" y="110" width="130" height="114" rx="12" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="135" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#0b4f8c">def</text>
    <text x="135" y="162" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">calculate_bill</text>
    <text x="135" y="184" text-anchor="middle" font-size="13" fill="#6b6f78">(price, qty)</text>
    <text x="135" y="206" text-anchor="middle" font-size="12" fill="#9aa3af">definition</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="204" y1="167" x2="228" y2="167"/>
    <polygon points="228,160 241,167 228,174"/>
  </g>

  <!-- Step 2: parameters -->
  <g>
    <rect x="248" y="110" width="130" height="114" rx="12" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="313" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Parameters</text>
    <text x="313" y="168" text-anchor="middle" font-size="12" fill="#6b6f78">price = 25</text>
    <text x="313" y="186" text-anchor="middle" font-size="12" fill="#6b6f78">qty = 3</text>
    <text x="313" y="208" text-anchor="middle" font-size="12" fill="#9aa3af">input values</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="382" y1="167" x2="406" y2="167"/>
    <polygon points="406,160 419,167 406,174"/>
  </g>

  <!-- Step 3: body -->
  <g>
    <rect x="426" y="110" width="130" height="114" rx="12" fill="#ffffff" stroke="#6b6f78" stroke-width="1.5"/>
    <text x="491" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Body</text>
    <text x="491" y="168" text-anchor="middle" font-size="12" fill="#6b6f78">total = price</text>
    <text x="491" y="184" text-anchor="middle" font-size="12" fill="#6b6f78">* qty</text>
    <text x="491" y="208" text-anchor="middle" font-size="12" fill="#9aa3af">indented work</text>
  </g>

  <!-- return arrow curving back up -->
  <g stroke="#1f9d57" stroke-width="2.5" fill="#1f9d57">
    <path d="M491 224 v20 a8 8 0 0 0 8 8 h40" fill="none" stroke="#1f9d57" stroke-width="2.5"/>
    <polygon points="545,246 555,252 545,258"/>
  </g>

  <!-- return value box -->
  <g>
    <rect x="555" y="230" width="80" height="36" rx="8" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="595" y="253" text-anchor="middle" font-size="13" font-weight="700" fill="#1f9d57">return 75</text>
  </g>

  <!-- footer note -->
  <text x="330" y="284" text-anchor="middle" font-size="11.5" fill="#9aa3af">Call the function by name and pass values in the same order.</text>
</svg>
