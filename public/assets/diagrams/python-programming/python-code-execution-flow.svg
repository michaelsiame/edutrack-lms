<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Python code execution flow: source file is read by the interpreter, compiled to bytecode, then executed to produce output.">
  <title>How Python Runs Your Code</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">How Python Runs Your Code</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Source becomes bytecode, then the computer acts on it</text>

  <!-- Stage 1: Source file -->
  <g>
    <rect x="18" y="90" width="136" height="154" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <!-- document icon -->
    <rect x="62" y="116" width="48" height="62" rx="5" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <line x1="72" y1="136" x2="100" y2="136" stroke="#0b4f8c" stroke-width="2"/>
    <line x1="72" y1="148" x2="100" y2="148" stroke="#0b4f8c" stroke-width="2"/>
    <line x1="72" y1="160" x2="90" y2="160" stroke="#0b4f8c" stroke-width="2"/>
    <text x="86" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Source File</text>
    <text x="86" y="216" text-anchor="middle" font-size="12" fill="#6b6f78">hello.py</text>
    <text x="86" y="231" text-anchor="middle" font-size="12" fill="#6b6f78">your code</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="158" y1="167" x2="186" y2="167"/>
    <polygon points="186,160 200,167 186,174"/>
  </g>

  <!-- Stage 2: Interpreter -->
  <g>
    <rect x="204" y="90" width="136" height="154" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <!-- magnifying glass / read icon -->
    <circle cx="272" cy="142" r="22" fill="none" stroke="#6b6f78" stroke-width="4"/>
    <line x1="288" y1="158" x2="302" y2="172" stroke="#6b6f78" stroke-width="4" stroke-linecap="round"/>
    <text x="272" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Interpreter</text>
    <text x="272" y="216" text-anchor="middle" font-size="12" fill="#6b6f78">Reads and checks</text>
    <text x="272" y="231" text-anchor="middle" font-size="12" fill="#6b6f78">each line</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="344" y1="167" x2="372" y2="167"/>
    <polygon points="372,160 386,167 372,174"/>
  </g>

  <!-- Stage 3: Bytecode -->
  <g>
    <rect x="390" y="90" width="136" height="154" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- gears / bytecode icon -->
    <circle cx="458" cy="138" r="10" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="458" cy="138" r="4" fill="#f59e0b"/>
    <circle cx="438" cy="154" r="8" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <circle cx="478" cy="154" r="8" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="458" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Bytecode</text>
    <text x="458" y="216" text-anchor="middle" font-size="12" fill="#6b6f78">hello.pyc</text>
    <text x="458" y="231" text-anchor="middle" font-size="12" fill="#6b6f78">machine-friendly</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="530" y1="167" x2="558" y2="167"/>
    <polygon points="558,160 572,167 558,174"/>
  </g>

  <!-- Stage 4: Output -->
  <g>
    <rect x="576" y="90" width="72" height="154" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <!-- screen icon -->
    <rect x="594" y="122" width="36" height="48" rx="4" fill="#ffffff" stroke="#1f9d57" stroke-width="1.5"/>
    <line x1="600" y1="138" x2="624" y2="138" stroke="#1f9d57" stroke-width="2"/>
    <line x1="600" y1="148" x2="618" y2="148" stroke="#1f9d57" stroke-width="2"/>
    <text x="612" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Output</text>
    <text x="612" y="216" text-anchor="middle" font-size="12" fill="#6b6f78">Hello,</text>
    <text x="612" y="231" text-anchor="middle" font-size="12" fill="#6b6f78">Kalomo!</text>
  </g>

  <!-- footer note -->
  <text x="330" y="284" text-anchor="middle" font-size="11.5" fill="#9aa3af">Python hides compilation: you write .py files and see results immediately.</text>
</svg>
