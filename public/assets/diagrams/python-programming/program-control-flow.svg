<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Program control flow: input feeds a decision, a loop repeats work, then output ends the process.">
  <title>Program Control Flow</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Program Control Flow</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Input, decide, repeat, then produce a result</text>

  <!-- Stage 1: Input -->
  <g>
    <rect x="30" y="108" width="120" height="118" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <!-- keyboard / input icon -->
    <rect x="60" y="130" width="60" height="38" rx="4" fill="#ffffff" stroke="#0b4f8c" stroke-width="1.5"/>
    <line x1="68" y1="140" x2="112" y2="140" stroke="#0b4f8c" stroke-width="2"/>
    <line x1="68" y1="150" x2="104" y2="150" stroke="#0b4f8c" stroke-width="2"/>
    <line x1="68" y1="160" x2="96" y2="160" stroke="#0b4f8c" stroke-width="2"/>
    <text x="90" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Input</text>
    <text x="90" y="208" text-anchor="middle" font-size="12" fill="#6b6f78">age = input()</text>
  </g>

  <!-- arrow 1 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="154" y1="167" x2="178" y2="167"/>
    <polygon points="178,160 191,167 178,174"/>
  </g>

  <!-- Stage 2: Decision (diamond) -->
  <g>
    <polygon points="230,108 300,167 230,226 160,167" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- question mark -->
    <text x="230" y="160" text-anchor="middle" font-size="22" font-weight="700" fill="#f59e0b">?</text>
    <text x="230" y="187" text-anchor="middle" font-size="13" font-weight="700" fill="#0a1628">Decision</text>
    <text x="230" y="205" text-anchor="middle" font-size="11" fill="#6b6f78">if age &gt;= 18</text>
  </g>

  <!-- arrow 2 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="304" y1="167" x2="330" y2="167"/>
    <polygon points="330,160 343,167 330,174"/>
  </g>

  <!-- Stage 3: Loop -->
  <g>
    <rect x="350" y="108" width="120" height="118" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <!-- circular arrow -->
    <path d="M390 145 a22 22 0 1 1 40 0" fill="none" stroke="#6b6f78" stroke-width="3" stroke-linecap="round"/>
    <polygon points="430,145 438,138 438,152" fill="#6b6f78"/>
    <text x="410" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Loop</text>
    <text x="410" y="208" text-anchor="middle" font-size="12" fill="#6b6f78">for item in list</text>
  </g>

  <!-- arrow 3 -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="474" y1="167" x2="498" y2="167"/>
    <polygon points="498,160 511,167 498,174"/>
  </g>

  <!-- Stage 4: Output -->
  <g>
    <rect x="520" y="108" width="120" height="118" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <!-- screen icon -->
    <rect x="550" y="130" width="60" height="44" rx="4" fill="#ffffff" stroke="#1f9d57" stroke-width="1.5"/>
    <line x1="560" y1="146" x2="600" y2="146" stroke="#1f9d57" stroke-width="2"/>
    <line x1="560" y1="156" x2="590" y2="156" stroke="#1f9d57" stroke-width="2"/>
    <text x="580" y="190" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Output</text>
    <text x="580" y="208" text-anchor="middle" font-size="12" fill="#6b6f78">print(result)</text>
  </g>

  <!-- footer note -->
  <text x="330" y="284" text-anchor="middle" font-size="11.5" fill="#9aa3af">Combine if-else, for, and while to steer any Python program.</text>
</svg>
