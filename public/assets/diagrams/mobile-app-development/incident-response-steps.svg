<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Incident response steps: Prepare, Detect, Contain, Eradicate, Recover, and Learn.">
  <title>Incident Response Steps</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Incident Response Steps</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">A repeatable cycle to control and recover from security incidents</text>

  <!-- Prepare -->
  <g>
    <circle cx="110" cy="100" r="22" fill="#0b4f8c"/>
    <text x="110" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
    <text x="110" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Prepare</text>
    <text x="110" y="162" text-anchor="middle" font-size="12" fill="#6b6f78">Plan, tools, team</text>
  </g>

  <!-- Detect -->
  <g>
    <circle cx="220" cy="100" r="22" fill="#0b4f8c"/>
    <text x="220" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
    <text x="220" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Detect</text>
    <text x="220" y="162" text-anchor="middle" font-size="12" fill="#6b6f78">Alerts, logs, SIEM</text>
  </g>

  <!-- Contain -->
  <g>
    <circle cx="330" cy="100" r="22" fill="#f59e0b"/>
    <text x="330" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
    <text x="330" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Contain</text>
    <text x="330" y="162" text-anchor="middle" font-size="12" fill="#6b6f78">Isolate damage</text>
  </g>

  <!-- Eradicate -->
  <g>
    <circle cx="440" cy="100" r="22" fill="#dc2626"/>
    <text x="440" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
    <text x="440" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Eradicate</text>
    <text x="440" y="162" text-anchor="middle" font-size="12" fill="#6b6f78">Remove threat</text>
  </g>

  <!-- Recover -->
  <g>
    <circle cx="550" cy="100" r="22" fill="#1f9d57"/>
    <text x="550" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5</text>
    <text x="550" y="145" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Recover</text>
    <text x="550" y="162" text-anchor="middle" font-size="12" fill="#6b6f78">Restore systems</text>
  </g>

  <!-- arrows between top steps -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="134" y1="100" x2="193" y2="100"/>
    <polygon points="193,93 206,100 193,107"/>
    <line x1="244" y1="100" x2="303" y2="100"/>
    <polygon points="303,93 316,100 303,107"/>
    <line x1="354" y1="100" x2="413" y2="100"/>
    <polygon points="413,93 426,100 413,107"/>
    <line x1="464" y1="100" x2="523" y2="100"/>
    <polygon points="523,93 536,100 523,107"/>
  </g>

  <!-- Learn (bottom) -->
  <g>
    <rect x="230" y="195" width="200" height="56" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <circle cx="330" cy="210" r="18" fill="#6b6f78"/>
    <text x="330" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6</text>
    <text x="330" y="242" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Learn</text>
  </g>

  <!-- arrows from Recover down to Learn and from Learn back to Prepare -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="550" y1="124" x2="550" y2="180"/>
    <line x1="550" y1="180" x2="430" y2="223"/>
    <polygon points="423,219 430,223 427,231"/>
    <line x1="230" y1="223" x2="110" y2="180"/>
    <line x1="110" y1="180" x2="110" y2="124"/>
    <polygon points="103,131 110,124 117,131"/>
  </g>

  <!-- footer note -->
  <text x="330" y="284" text-anchor="middle" font-size="11.5" fill="#9aa3af">Document every step so the team improves after each incident.</text>
</svg>
