<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The CIA triad of cybersecurity: confidentiality, integrity, and availability form the goals protected by network defense.">
  <title>The CIA Triad</title>

  <text x="330" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">The CIA Triad</text>
  <text x="330" y="54" text-anchor="middle" font-size="13" fill="#6b6f78">Three goals every firewall, policy, and control is designed to protect</text>

  <!-- Triangle connecting lines -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="none">
    <line x1="330" y1="92" x2="120" y2="252"/>
    <line x1="120" y1="252" x2="540" y2="252"/>
    <line x1="540" y1="252" x2="330" y2="92"/>
  </g>

  <!-- Confidentiality (top) -->
  <g>
    <rect x="270" y="65" width="120" height="55" rx="12" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="330" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Confidentiality</text>
    <text x="330" y="106" text-anchor="middle" font-size="11" fill="#6b6f78">Keep secrets secret</text>
  </g>

  <!-- Integrity (bottom left) -->
  <g>
    <rect x="60" y="225" width="120" height="55" rx="12" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="120" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Integrity</text>
    <text x="120" y="266" text-anchor="middle" font-size="11" fill="#6b6f78">Data stays accurate</text>
  </g>

  <!-- Availability (bottom right) -->
  <g>
    <rect x="480" y="225" width="120" height="55" rx="12" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="540" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">Availability</text>
    <text x="540" y="266" text-anchor="middle" font-size="11" fill="#6b6f78">Systems stay online</text>
  </g>

  <!-- Center shield icon -->
  <circle cx="330" cy="172" r="36" fill="#ffffff" stroke="#d8dee6" stroke-width="2"/>
  <path d="M330 152 l20 10 v20 c0 14 -20 22 -20 22 s-20 -8 -20 -22 v-20 z" fill="#0b4f8c"/>
  <path d="M322 172 l6 6 14 -14" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="330" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#0a1628">Network Defense</text>
</svg>
