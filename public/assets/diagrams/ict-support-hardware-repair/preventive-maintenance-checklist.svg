<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Preventive maintenance checklist for computers: clean dust, manage heat, install updates, and back up data before load-shedding.">
  <title>Preventive Maintenance Checklist</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Preventive Maintenance Checklist</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Regular habits that keep computers running longer in Zambia</text>

  <!-- Item 1: Dust -->
  <g>
    <rect x="35" y="80" width="280" height="80" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <circle cx="70" cy="120" r="18" fill="#1f9d57"/>
    <path d="M60 120 l7 7 14 -14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="115" text-anchor="start" font-size="15" font-weight="700" fill="#0a1628">Clean dust</text>
    <text x="100" y="135" text-anchor="start" font-size="12" fill="#6b6f78">Blow out fans, vents, and PSU</text>
    <text x="100" y="150" text-anchor="start" font-size="12" fill="#6b6f78">every 3-6 months</text>
  </g>

  <!-- Item 2: Heat -->
  <g>
    <rect x="345" y="80" width="280" height="80" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="380" cy="120" r="18" fill="#f59e0b"/>
    <path d="M370 120 l7 7 14 -14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="410" y="115" text-anchor="start" font-size="15" font-weight="700" fill="#0a1628">Manage heat</text>
    <text x="410" y="135" text-anchor="start" font-size="12" fill="#6b6f78">Keep air flowing; replace dry</text>
    <text x="410" y="150" text-anchor="start" font-size="12" fill="#6b6f78">thermal paste on the CPU</text>
  </g>

  <!-- Item 3: Updates -->
  <g>
    <rect x="35" y="180" width="280" height="80" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <circle cx="70" cy="220" r="18" fill="#0b4f8c"/>
    <path d="M60 220 l7 7 14 -14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="100" y="215" text-anchor="start" font-size="15" font-weight="700" fill="#0a1628">Install updates</text>
    <text x="100" y="235" text-anchor="start" font-size="12" fill="#6b6f78">Windows updates, drivers,</text>
    <text x="100" y="250" text-anchor="start" font-size="12" fill="#6b6f78">and antivirus definitions</text>
  </g>

  <!-- Item 4: Backup -->
  <g>
    <rect x="345" y="180" width="280" height="80" rx="16" fill="#fdecec" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="380" cy="220" r="18" fill="#dc2626"/>
    <path d="M370 220 l7 7 14 -14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="410" y="215" text-anchor="start" font-size="15" font-weight="700" fill="#0a1628">Back up data</text>
    <text x="410" y="235" text-anchor="start" font-size="12" fill="#6b6f78">Copy files to flash disk or cloud</text>
    <text x="410" y="250" text-anchor="start" font-size="12" fill="#6b6f78">before load-shedding strikes</text>
  </g>

  <!-- footer note -->
  <text x="330" y="286" text-anchor="middle" font-size="11.5" fill="#9aa3af">Prevention is cheaper than emergency repairs and lost customer data.</text>
</svg>
