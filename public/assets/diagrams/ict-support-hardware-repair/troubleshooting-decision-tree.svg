<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Troubleshooting decision tree for a PC that will not start, branching by no power light, no display, or beep codes.">
  <title>PC Troubleshooting Decision Tree</title>

  <!-- title -->
  <text x="330" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">PC Troubleshooting Decision Tree</text>
  <text x="330" y="50" text-anchor="middle" font-size="13" fill="#6b6f78">Start with the symptom, then work down to the likely cause</text>

  <!-- Root -->
  <g>
    <rect x="255" y="64" width="150" height="40" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="2"/>
    <text x="330" y="89" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">PC won't start?</text>
  </g>

  <!-- Root to branches connectors -->
  <line x1="330" y1="104" x2="330" y2="120" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="130" y1="120" x2="530" y2="120" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="130" y1="120" x2="130" y2="140" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="330" y1="120" x2="330" y2="140" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="530" y1="120" x2="530" y2="140" stroke="#9aa3af" stroke-width="2.5"/>

  <!-- Branch 1: No power light -->
  <g>
    <rect x="55" y="140" width="150" height="40" rx="12" fill="#fdecec" stroke="#dc2626" stroke-width="1.5"/>
    <text x="130" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">No power light</text>
  </g>

  <!-- Branch 2: No display -->
  <g>
    <rect x="240" y="140" width="180" height="40" rx="12" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="330" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">Power light on, no display</text>
  </g>

  <!-- Branch 3: Beep codes -->
  <g>
    <rect x="455" y="140" width="150" height="40" rx="12" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="530" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#1f9d57">Beep codes</text>
  </g>

  <!-- Branch to solution connectors -->
  <line x1="130" y1="180" x2="130" y2="195" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="330" y1="180" x2="330" y2="195" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="530" y1="180" x2="530" y2="195" stroke="#9aa3af" stroke-width="2.5"/>

  <!-- Solution 1 -->
  <g>
    <rect x="35" y="195" width="190" height="52" rx="12" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <text x="130" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Check power cable &amp; socket</text>
    <text x="130" y="236" text-anchor="middle" font-size="12" fill="#6b6f78">Then test or replace PSU</text>
  </g>

  <!-- Solution 2 -->
  <g>
    <rect x="235" y="195" width="190" height="52" rx="12" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="330" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">Check monitor &amp; video cable</text>
    <text x="330" y="236" text-anchor="middle" font-size="12" fill="#6b6f78">Then reseat RAM sticks</text>
  </g>

  <!-- Solution 3 -->
  <g>
    <rect x="435" y="195" width="190" height="52" rx="12" fill="#ffffff" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="530" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1f9d57">Count beeps, check manual</text>
    <text x="530" y="236" text-anchor="middle" font-size="12" fill="#6b6f78">Reseat RAM, CPU, or GPU</text>
  </g>

  <!-- footer note -->
  <text x="330" y="278" text-anchor="middle" font-size="11.5" fill="#9aa3af">Always unplug the PC and discharge static before opening the case.</text>
</svg>
