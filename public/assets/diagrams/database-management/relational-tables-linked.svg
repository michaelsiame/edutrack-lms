<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Two related database tables: customers and orders, linked by a foreign key.">
  <title>Relational Tables Linked by a Foreign Key</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Relational Tables Linked by a Foreign Key</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">A primary key in one table becomes a foreign key in another</text>

  <!-- Customers table -->
  <g>
    <rect x="70" y="90" width="230" height="160" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <text x="185" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">customers</text>
    <!-- header row -->
    <rect x="86" y="128" width="198" height="26" rx="6" fill="#0b4f8c"/>
    <text x="96" y="146" font-size="12" font-weight="700" fill="#ffffff">customer_id</text>
    <text x="185" y="146" font-size="12" font-weight="700" fill="#ffffff">name</text>
    <text x="255" y="146" font-size="12" font-weight="700" fill="#ffffff">phone</text>
    <!-- data rows -->
    <text x="96" y="176" font-size="12" fill="#6b6f78">1</text>
    <text x="185" y="176" font-size="12" fill="#6b6f78">Chanda</text>
    <text x="255" y="176" font-size="12" fill="#6b6f78">0977...</text>
    <text x="96" y="202" font-size="12" fill="#6b6f78">2</text>
    <text x="185" y="202" font-size="12" fill="#6b6f78">Mutale</text>
    <text x="255" y="202" font-size="12" fill="#6b6f78">0966...</text>
    <text x="96" y="228" font-size="12" fill="#6b6f78">3</text>
    <text x="185" y="228" font-size="12" fill="#6b6f78">Bwalya</text>
    <text x="255" y="228" font-size="12" fill="#6b6f78">0771...</text>
    <!-- PK badge -->
    <rect x="86" y="240" width="70" height="20" rx="8" fill="#0b4f8c"/>
    <text x="121" y="254" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">PRIMARY KEY</text>
  </g>

  <!-- Arrow -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="305" y1="170" x2="345" y2="170"/>
    <polygon points="345,163 358,170 345,177"/>
  </g>

  <!-- Orders table -->
  <g>
    <rect x="360" y="90" width="230" height="160" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="475" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">orders</text>
    <!-- header row -->
    <rect x="376" y="128" width="198" height="26" rx="6" fill="#f59e0b"/>
    <text x="386" y="146" font-size="12" font-weight="700" fill="#ffffff">order_id</text>
    <text x="460" y="146" font-size="11" font-weight="700" fill="#ffffff">customer_id</text>
    <text x="540" y="146" font-size="12" font-weight="700" fill="#ffffff">amount</text>
    <!-- data rows -->
    <text x="386" y="176" font-size="12" fill="#6b6f78">101</text>
    <text x="475" y="176" font-size="12" fill="#6b6f78">2</text>
    <text x="550" y="176" font-size="12" fill="#6b6f78">K450</text>
    <text x="386" y="202" font-size="12" fill="#6b6f78">102</text>
    <text x="475" y="202" font-size="12" fill="#6b6f78">1</text>
    <text x="550" y="202" font-size="12" fill="#6b6f78">K120</text>
    <text x="386" y="228" font-size="12" fill="#6b6f78">103</text>
    <text x="475" y="228" font-size="12" fill="#6b6f78">2</text>
    <text x="550" y="228" font-size="12" fill="#6b6f78">K800</text>
    <!-- FK badge -->
    <rect x="450" y="240" width="70" height="20" rx="8" fill="#f59e0b"/>
    <text x="485" y="254" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">FOREIGN KEY</text>
  </g>

  <!-- footer note -->
  <text x="330" y="280" text-anchor="middle" font-size="11.5" fill="#9aa3af">The foreign key guarantees every order belongs to a real customer.</text>
</svg>
