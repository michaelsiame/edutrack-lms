<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="The SQL CRUD cycle: create with INSERT, read with SELECT, update with UPDATE, and delete with DELETE.">
  <title>The SQL CRUD Cycle</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">The SQL CRUD Cycle</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">The four basic operations you perform on database records</text>

  <!-- CREATE -->
  <g>
    <rect x="70" y="85" width="130" height="120" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <circle cx="135" cy="118" r="18" fill="#1f9d57"/>
    <!-- plus -->
    <line x1="135" y1="110" x2="135" y2="126" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="127" y1="118" x2="143" y2="118" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <text x="135" y="156" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">CREATE</text>
    <text x="135" y="174" text-anchor="middle" font-size="12" fill="#6b6f78">INSERT INTO</text>
    <text x="135" y="190" text-anchor="middle" font-size="12" fill="#6b6f78">Add new row</text>
  </g>

  <!-- READ -->
  <g>
    <rect x="210" y="85" width="130" height="120" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <circle cx="275" cy="118" r="18" fill="#0b4f8c"/>
    <!-- magnifying glass -->
    <circle cx="275" cy="114" r="6" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <line x1="279" y1="118" x2="284" y2="124" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <text x="275" y="156" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">READ</text>
    <text x="275" y="174" text-anchor="middle" font-size="12" fill="#6b6f78">SELECT</text>
    <text x="275" y="190" text-anchor="middle" font-size="12" fill="#6b6f78">Find rows</text>
  </g>

  <!-- UPDATE -->
  <g>
    <rect x="350" y="85" width="130" height="120" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="415" cy="118" r="18" fill="#f59e0b"/>
    <!-- pencil -->
    <path d="M410 124 l10 -10 4 4 -10 10 z" fill="#ffffff"/>
    <path d="M408 126 l2 4 -4 2 z" fill="#ffffff"/>
    <text x="415" y="156" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">UPDATE</text>
    <text x="415" y="174" text-anchor="middle" font-size="12" fill="#6b6f78">UPDATE ... SET</text>
    <text x="415" y="190" text-anchor="middle" font-size="12" fill="#6b6f78">Change row</text>
  </g>

  <!-- DELETE -->
  <g>
    <rect x="490" y="85" width="130" height="120" rx="16" fill="#fdecec" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="555" cy="118" r="18" fill="#dc2626"/>
    <!-- trash -->
    <rect x="549" y="113" width="12" height="14" rx="1" fill="#ffffff"/>
    <rect x="547" y="110" width="16" height="3" rx="1" fill="#ffffff"/>
    <line x1="552" y1="116" x2="552" y2="123" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="555" y1="116" x2="555" y2="123" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="558" y1="116" x2="558" y2="123" stroke="#dc2626" stroke-width="1.5"/>
    <text x="555" y="156" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">DELETE</text>
    <text x="555" y="174" text-anchor="middle" font-size="12" fill="#6b6f78">DELETE FROM</text>
    <text x="555" y="190" text-anchor="middle" font-size="12" fill="#6b6f78">Remove row</text>
  </g>

  <!-- top arrows -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="202" y1="145" x2="208" y2="145"/><polygon points="208,138 218,145 208,152"/>
    <line x1="342" y1="145" x2="348" y2="145"/><polygon points="348,138 358,145 348,152"/>
    <line x1="482" y1="145" x2="488" y2="145"/><polygon points="488,138 498,145 488,152"/>
  </g>

  <!-- return arrow (cycle) -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <path d="M555 235 q-225 35 -420 0" fill="none"/>
    <polygon points="135,228 122,235 135,242"/>
  </g>

  <!-- footer note -->
  <text x="330" y="278" text-anchor="middle" font-size="11.5" fill="#9aa3af">Most everyday SQL is just these four operations used in a loop.</text>
</svg>
