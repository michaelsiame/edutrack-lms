<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Work breakdown structure for a school IT lab project: project branches into planning, setup, and handover, each with two deliverables.">
  <title>Work Breakdown Structure Example</title>

  <!-- title -->
  <text x="330" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">Work Breakdown Structure (WBS)</text>
  <text x="330" y="50" text-anchor="middle" font-size="13" fill="#6b6f78">Break a project into phases, then into deliverables you can assign</text>

  <!-- Root: Project -->
  <g>
    <rect x="220" y="62" width="220" height="42" rx="12" fill="#eef4fb" stroke="#0b4f8c" stroke-width="2"/>
    <text x="330" y="89" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">School IT Lab Project</text>
  </g>

  <!-- connectors root -> phases -->
  <line x1="330" y1="104" x2="330" y2="120" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="130" y1="120" x2="530" y2="120" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="130" y1="120" x2="130" y2="138" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="330" y1="120" x2="330" y2="138" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="530" y1="120" x2="530" y2="138" stroke="#9aa3af" stroke-width="2.5"/>

  <!-- Phase 1: Planning -->
  <g>
    <rect x="55" y="138" width="150" height="40" rx="12" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="130" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">1. Planning</text>
  </g>

  <!-- Phase 2: Setup -->
  <g>
    <rect x="255" y="138" width="150" height="40" rx="12" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="330" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">2. Setup</text>
  </g>

  <!-- Phase 3: Handover -->
  <g>
    <rect x="455" y="138" width="150" height="40" rx="12" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <text x="530" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#0a1628">3. Handover</text>
  </g>

  <!-- connectors phases -> deliverables -->
  <line x1="130" y1="178" x2="130" y2="194" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="55" y1="194" x2="205" y2="194" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="80" y1="194" x2="80" y2="212" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="180" y1="194" x2="180" y2="212" stroke="#9aa3af" stroke-width="2.5"/>

  <line x1="330" y1="178" x2="330" y2="194" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="255" y1="194" x2="405" y2="194" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="280" y1="194" x2="280" y2="212" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="380" y1="194" x2="380" y2="212" stroke="#9aa3af" stroke-width="2.5"/>

  <line x1="530" y1="178" x2="530" y2="194" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="455" y1="194" x2="605" y2="194" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="480" y1="194" x2="480" y2="212" stroke="#9aa3af" stroke-width="2.5"/>
  <line x1="580" y1="194" x2="580" y2="212" stroke="#9aa3af" stroke-width="2.5"/>

  <!-- Deliverables -->
  <g>
    <rect x="35" y="212" width="90" height="38" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="80" y="236" text-anchor="middle" font-size="12" fill="#6b6f78">Site survey</text>
  </g>
  <g>
    <rect x="135" y="212" width="90" height="38" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="180" y="236" text-anchor="middle" font-size="12" fill="#6b6f78">Budget set</text>
  </g>

  <g>
    <rect x="235" y="212" width="90" height="38" rx="8" fill="#ffffff" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="280" y="236" text-anchor="middle" font-size="12" fill="#6b6f78">PCs installed</text>
  </g>
  <g>
    <rect x="335" y="212" width="90" height="38" rx="8" fill="#ffffff" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="380" y="236" text-anchor="middle" font-size="12" fill="#6b6f78">Network live</text>
  </g>

  <g>
    <rect x="435" y="212" width="90" height="38" rx="8" fill="#ffffff" stroke="#6b6f78" stroke-width="1.5"/>
    <text x="480" y="236" text-anchor="middle" font-size="12" fill="#6b6f78">Users trained</text>
  </g>
  <g>
    <rect x="535" y="212" width="90" height="38" rx="8" fill="#ffffff" stroke="#6b6f78" stroke-width="1.5"/>
    <text x="580" y="236" text-anchor="middle" font-size="12" fill="#6b6f78">Manual done</text>
  </g>

  <!-- footer note -->
  <text x="330" y="282" text-anchor="middle" font-size="11.5" fill="#9aa3af">Each box is a deliverable that can be assigned, budgeted, and tracked.</text>
</svg>
