<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="A five-day weekly social media rhythm: Monday educate, Tuesday tell a story, Wednesday engage, Thursday show proof, Friday promote.">
  <title>A Simple Weekly Social Media Rhythm</title>

  <!-- title -->
  <text x="330" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0a1628">A Simple Weekly Social Media Rhythm</text>
  <text x="330" y="56" text-anchor="middle" font-size="13" fill="#6b6f78">Repeat this pattern so followers know what to expect</text>

  <!-- Monday: Educate -->
  <g>
    <rect x="10" y="80" width="108" height="160" rx="16" fill="#eef4fb" stroke="#0b4f8c" stroke-width="1.5"/>
    <circle cx="64" cy="120" r="22" fill="#0b4f8c"/>
    <!-- lightbulb icon -->
    <circle cx="64" cy="115" r="9" fill="#ffffff"/>
    <rect x="60" y="124" width="8" height="10" rx="2" fill="#ffffff"/>
    <text x="64" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Mon</text>
    <text x="64" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#0b4f8c">Educate</text>
    <text x="64" y="212" text-anchor="middle" font-size="12" fill="#6b6f78">Share a tip</text>
  </g>

  <!-- Tuesday: Story -->
  <g>
    <rect x="143" y="80" width="108" height="160" rx="16" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="197" cy="120" r="22" fill="#f59e0b"/>
    <!-- story / phone icon -->
    <rect x="188" y="108" width="18" height="30" rx="3" fill="#ffffff"/>
    <rect x="190" y="112" width="14" height="20" rx="1" fill="#fef6e7"/>
    <text x="197" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Tue</text>
    <text x="197" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">Story</text>
    <text x="197" y="212" text-anchor="middle" font-size="12" fill="#6b6f78">Behind scenes</text>
  </g>

  <!-- Wednesday: Engage -->
  <g>
    <rect x="276" y="80" width="108" height="160" rx="16" fill="#f7f8fa" stroke="#d8dee6" stroke-width="1.5"/>
    <circle cx="330" cy="120" r="22" fill="#6b6f78"/>
    <!-- speech bubble icon -->
    <rect x="318" y="110" width="24" height="18" rx="5" fill="#ffffff"/>
    <polygon points="325,128 330,136 335,128" fill="#ffffff"/>
    <text x="330" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Wed</text>
    <text x="330" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#6b6f78">Engage</text>
    <text x="330" y="212" text-anchor="middle" font-size="12" fill="#6b6f78">Ask a question</text>
  </g>

  <!-- Thursday: Proof -->
  <g>
    <rect x="409" y="80" width="108" height="160" rx="16" fill="#ecfaf2" stroke="#1f9d57" stroke-width="1.5"/>
    <circle cx="463" cy="120" r="22" fill="#1f9d57"/>
    <!-- checkmark icon -->
    <path d="M453 119 l7 8 14 -16" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="463" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Thu</text>
    <text x="463" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#1f9d57">Proof</text>
    <text x="463" y="212" text-anchor="middle" font-size="12" fill="#6b6f78">Customer win</text>
  </g>

  <!-- Friday: Promote -->
  <g>
    <rect x="542" y="80" width="108" height="160" rx="16" fill="#fdecec" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="596" cy="120" r="22" fill="#dc2626"/>
    <!-- tag icon -->
    <path d="M586 112 l10 -4 10 4 v14 l-10 8 -10 -8 z" fill="#ffffff"/>
    <text x="596" y="174" text-anchor="middle" font-size="15" font-weight="700" fill="#0a1628">Fri</text>
    <text x="596" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Promote</text>
    <text x="596" y="212" text-anchor="middle" font-size="12" fill="#6b6f78">Offer / CTA</text>
  </g>

  <!-- arrows between cards -->
  <g stroke="#9aa3af" stroke-width="2.5" fill="#9aa3af">
    <line x1="118" y1="160" x2="138" y2="160"/>
    <polygon points="138,153 151,160 138,167"/>
    <line x1="251" y1="160" x2="271" y2="160"/>
    <polygon points="271,153 284,160 271,167"/>
    <line x1="384" y1="160" x2="404" y2="160"/>
    <polygon points="404,153 417,160 404,167"/>
    <line x1="517" y1="160" x2="537" y2="160"/>
    <polygon points="537,153 550,160 537,167"/>
  </g>

  <!-- footer note -->
  <text x="330" y="274" text-anchor="middle" font-size="11.5" fill="#9aa3af">Post at the same times each day so your audience builds a habit.</text>
</svg>
